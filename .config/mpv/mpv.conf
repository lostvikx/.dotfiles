# User Config File (vik)

# Video Output
#hwdec=auto-safe
#hwdec-codecs=all
hwdec=vaapi
fullscreen=no
vo=gpu
gpu-context=x11

# Cache
cache=no

# Subtitles
sub-auto=fuzzy
sub-font="monospace"
sub-font-size=32
sub-color="#FFFFFF"
sub-pos=100
sub-outline-color="#000000"
sub-border-size=3
sub-border-style=outline-and-shadow
#sub-border-style=opaque-box

# Audio Output
audio-device=pipewire
audio-channels=stereo
volume-max=120

# Video Playback
autofit=100%x50%

# Interface
osc=yes  # Enable on-screen controller
osd-duration=2000
osd-font="monospace"
osd-font-size=24

# Miscellaneous
keep-open=no
save-position-on-quit=no
screenshot-directory="~/Pictures/mpv"
no-keepaspect-window

# Default Audio and Subtitles
alang=jp,jpn,ja
slang=en,eng
subs-with-matching-audio=no

# Stream YouTube videos to mpv
script-opts=ytdl_hook-ytdl_path=/home/vik/.local/bin/yt-dlp

# yt-dlp presets
[1080p]
ytdl-format=bestvideo[height<=?1080]+bestaudio/best
