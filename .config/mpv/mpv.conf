# User Config File [vik]

# Hardware Decoding
hwdec=auto-safe
vo=gpu-next
gpu-context=x11
#gpu-api=vulkan  # low vram error

# Cache
cache=no

# Subtitles
sub-auto=fuzzy

#sub-font="Arial"  # default
sub-font="Noto Sans"
sub-font-size=38

# Basic Color
#sub-color="#FFFFFF"
#sub-outline-color="#000000"

# Parchment Color
sub-color="#FFF0C0"
sub-outline-color="#3A2200"

sub-border-size=2.2
sub-border-style=outline-and-shadow

sub-shadow-offset=0.8
sub-bold=yes
sub-pos=100
sub-scale-by-window=yes

blend-subtitles=yes

# Audio Output
audio-device=pipewire
audio-channels=stereo
volume-max=120

# Video Playback
fullscreen=no
autofit=100%x50%
window-scale=1.0

# Interface
osc=yes  # Enable on-screen controller
osd-duration=2000

osd-font="monospace"
osd-font-size=24

# Miscellaneous
keep-open=no
save-position-on-quit=no
screenshot-directory="~/Pictures/mpv"
no-keepaspect-window

# Default Audio and Subtitles
alang=jp,jpn,ja
slang=en,eng
subs-with-matching-audio=no

# Stream YouTube videos to mpv
script-opts=ytdl_hook-ytdl_path=/home/vik/.local/bin/yt-dlp

# yt-dlp presets
[1080p]
ytdl-format=bestvideo[height<=?1080]+bestaudio/best
